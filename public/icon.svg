<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="100%" stop-color="#0057FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="50,2 94,26 94,74 50,98 6,74 6,26"
           fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.35"/>
  <!-- Inner hexagon -->
  <polygon points="50,12 86,32 86,68 50,88 14,68 14,32"
           fill="#0A0A0A" stroke="url(#grad)" stroke-width="2"/>

  <!-- Circuit nodes -->
  <line x1="14" y1="32" x2="3" y2="24" stroke="#00A3FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="3" cy="24" r="2" fill="#00A3FF" opacity="0.5"/>
  <line x1="86" y1="32" x2="97" y2="24" stroke="#00A3FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="97" cy="24" r="2" fill="#00A3FF" opacity="0.5"/>
  <line x1="86" y1="68" x2="97" y2="76" stroke="#00A3FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="97" cy="76" r="2" fill="#00A3FF" opacity="0.5"/>
  <line x1="14" y1="68" x2="3" y2="76" stroke="#00A3FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="3" cy="76" r="2" fill="#00A3FF" opacity="0.5"/>

  <!-- Lock icon -->
  <g transform="translate(50, 52)" filter="url(#glow)">
    <rect x="-13" y="-2" width="26" height="20" rx="4" fill="url(#grad)"/>
    <path d="M-7 -2 V-12 A7 7 0 0 1 7 -12 V-2" stroke="#00A3FF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="8" r="3.5" fill="#0A0A0A"/>
    <rect x="-1.5" y="8" width="3" height="6" rx="1.2" fill="#0A0A0A"/>
  </g>
</svg>